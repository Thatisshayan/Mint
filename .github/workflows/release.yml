name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: windows-latest
            args: ''
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm ci

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Generate Prisma client
        run: cd backend && npx prisma generate

      - name: Build backend
        run: cd backend && npm run build

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MINT ${{ github.ref_name }}'
          releaseBody: |
            ## MINT Desktop App ${{ github.ref_name }}

            ### Install
            - **macOS (Apple Silicon):** Download `.dmg` (aarch64), open and drag to Applications
            - **macOS (Intel):** Download `.dmg` (x86_64), open and drag to Applications
            - **Windows:** Download `.msi`, run installer
            - **Linux:** Download `.AppImage`, `chmod +x` and run

            ### First launch
            The app starts its own backend on port 19421. No Docker, no terminal needed.

            ### Requirements
            - **Optional:** [Ollama](https://ollama.ai) for local AI
            - **Optional:** FFmpeg for video assembly
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
