name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install root npm dependencies
        run: npm ci

      - name: Install backend dependencies
        run: cd backend && npm install

      - name: Generate Prisma client
        run: cd backend && npx prisma generate

      - name: Build backend
        run: cd backend && npm run build

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npx tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'MINT ${{ github.ref_name }}'
          releaseBody: |
            ## MINT Desktop App ${{ github.ref_name }}

            ### Install (Windows)
            Download `MINT_x.x.x_x64_en-US.msi` and run the installer.

            ### First launch
            Double-click MINT — the app starts its own backend on port 19421.
            No Docker, no terminal, no setup needed.

            ### Optional
            - [Ollama](https://ollama.ai) for free local AI
            - FFmpeg for video assembly (detectable via Settings)
          releaseDraft: false
          prerelease: false
