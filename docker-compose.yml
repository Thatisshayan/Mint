services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mint
      POSTGRES_PASSWORD: mint_dev
      POSTGRES_DB: mint
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://mint:***@postgres:5432/mint
      JWT_SECRET: local_dev_secret_change_me
      PORT: 4000
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http=require('http');const req=http.get('http://localhost:4000/health');req.on('error',()=>process.exit(1));req.on('response',()=>process.exit(0))\""]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:4000/api
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http=require('http');const req=http.get('http://localhost:5173');req.on('error',()=>process.exit(1));req.on('response',()=>process.exit(0))\""]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 20s

volumes:
  pgdata:
