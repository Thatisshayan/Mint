services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mint
      POSTGRES_PASSWORD: mint_dev
      POSTGRES_DB: mint
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://mint:mint_dev@postgres:5432/mint
      JWT_SECRET: local_dev_secret_change_me
      PORT: 4000
      MONEY_PRINTER_URL: http://money-printer:8501
      COMFYUI_BASE_URL: ${COMFYUI_BASE_URL:-http://host.docker.internal:8188}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http=require('http');const req=http.get('http://localhost:4000/health');req.on('error',()=>process.exit(1));req.on('response',()=>process.exit(0))\""]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:4000/api
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http=require('http');const req=http.get('http://localhost:5173');req.on('error',()=>process.exit(1));req.on('response',()=>process.exit(0))\""]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 20s

  money-printer:
    image: harry0703/moneyprinterturbo:latest
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      API_KEY: ${MPT_API_KEY:-}
      LLM_PROVIDER: openai
      OPENAI_API_KEY: ${DEEPSEEK_API_KEY:-}
      OPENAI_BASE_URL: https://api.deepseek.com/v1
    volumes:
      - mpt_output:/app/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8501/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  pgdata:
  mpt_output:
